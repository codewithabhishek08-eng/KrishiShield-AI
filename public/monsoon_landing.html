<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KrishiShield AI | Monsoon Genesis</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anybody:ital,wght@0,900;1,900&family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #81C784;
            --accent: #FF7043;
            --bg: #0A0D1A;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg);
            font-family: 'Inter', sans-serif;
            color: white;
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
        }

        .overlay {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: radial-gradient(circle at center, transparent 0%, rgba(10, 13, 26, 0.4) 100%);
            pointer-events: none;
        }

        .content {
            opacity: 0;
            transform: translateY(20px);
            transition: all 1.2s cubic-bezier(0.22, 1, 0.36, 1);
            pointer-events: auto;
        }

        .content.visible {
            opacity: 1;
            transform: translateY(0);
        }

        h2 {
            font-family: 'Anybody', sans-serif;
            font-weight: 900;
            font-style: italic;
            font-size: clamp(1.2rem, 3vw, 1.8rem);
            margin: 0;
            color: rgba(129, 199, 132, 0.8);
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }

        h1 {
            font-family: 'Anybody', sans-serif;
            font-weight: 900;
            font-style: italic;
            font-size: clamp(3rem, 10vw, 7rem);
            margin: 10px 0;
            line-height: 0.9;
            background: linear-gradient(to bottom, #fff, #81C784);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 30px rgba(129, 199, 132, 0.3));
        }

        p {
            font-size: clamp(1rem, 2vw, 1.2rem);
            font-weight: 300;
            color: rgba(255, 255, 255, 0.6);
            max-width: 600px;
            margin: 20px auto 40px;
            letter-spacing: 0.05em;
        }

        .btn {
            background: linear-gradient(135deg, #1B5E20, #2E7D32);
            color: white;
            padding: 18px 48px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            border: 1px solid rgba(129, 199, 132, 0.3);
            transition: all 0.4s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            display: inline-block;
        }

        .btn:hover {
            transform: scale(1.05) translateY(-2px);
            box-shadow: 0 15px 40px rgba(129, 199, 132, 0.2);
            border-color: rgba(129, 199, 132, 0.6);
        }

        .loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0A0D1A;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 1s ease;
        }

        .loader-spinner {
            width: 40px;
            height: 40px;
            border: 2px solid rgba(129, 199, 132, 0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .hidden {
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="loader" class="loader">
        <div class="loader-spinner"></div>
    </div>

    <div id="canvas-container"></div>

    <div class="overlay">
        <div id="content" class="content">
            <h2>मानसून की पुकार</h2>
            <h1>KrishiShield AI</h1>
            <p>Predicting nature's next move to protect your harvest. Every drop counts, every decision matters.</p>
            <a href="/dashboard" class="btn">Enter the Field</a>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.158.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.158.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- Configuration & State ---
        const config = {
            rainCount: 15000,
            birdCount: 50,
            treeCount: 500,
            cloudCount: 8
        };

        let scene, camera, renderer, clock;
        let rainParticles, birdInstances, valley, clouds = [];
        
        // --- Initialization ---
        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0d1a);
            scene.fog = new THREE.FogExp2(0x0d1a14, 0.01);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
            camera.position.set(0, 5, 20);
            camera.lookAt(0, 2, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.outputColorSpace = THREE.SRGBColorSpace;
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            clock = new THREE.Clock();

            createLighting();
            createValley();
            createRain();
            createClouds();
            createBirds();

            window.addEventListener('resize', onWindowResize);
            
            // Start the reveal
            setTimeout(() => {
                document.getElementById('loader').classList.add('hidden');
                document.getElementById('content').classList.add('visible');
            }, 1000);

            animate();
        }

        // --- Scene Elements ---

        function createLighting() {
            const ambient = new THREE.AmbientLight(0x404040, 0.5);
            scene.add(ambient);

            const hemi = new THREE.HemisphereLight(0x81c784, 0x0a0d1a, 0.6);
            scene.add(hemi);

            const sun = new THREE.DirectionalLight(0xffffff, 0.8);
            sun.position.set(50, 100, -50);
            scene.add(sun);
        }

        function createValley() {
            const geometry = new THREE.PlaneGeometry(300, 300, 128, 128);
            geometry.rotateX(-Math.PI / 2);

            const position = geometry.attributes.position;
            for (let i = 0; i < position.count; i++) {
                const x = position.getX(i);
                const z = position.getZ(i);
                
                // Create a valley shape: center is low, edges are high
                const dist = Math.sqrt(x * x + z * z);
                const height = Math.pow(dist / 50, 2) * 5;
                
                // Add some noise for mountain texture
                const noise = (Math.sin(x * 0.1) * Math.cos(z * 0.1)) * 2;
                const detail = (Math.sin(x * 0.5) * Math.sin(z * 0.5)) * 0.5;
                
                position.setY(i, height + noise + detail);
            }
            geometry.computeVertexNormals();

            const material = new THREE.MeshPhongLight({
                color: 0x1a3a1a,
                shininess: 0,
                flatShading: false
            });

            // Use a simple shader-like material for lush greenery
            const customMaterial = new THREE.MeshStandardMaterial({
                color: 0x228B22,
                roughness: 0.8,
                metalness: 0.1
            });

            valley = new THREE.Mesh(geometry, customMaterial);
            scene.add(valley);
        }

        function createRain() {
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(config.rainCount * 3);
            const velocities = new Float32Array(config.rainCount);

            for (let i = 0; i < config.rainCount; i++) {
                positions[i * 3] = (Math.random() - 0.5) * 200;
                positions[i * 3 + 1] = Math.random() * 100;
                positions[i * 3 + 2] = (Math.random() - 0.5) * 200;
                velocities[i] = 0.5 + Math.random() * 0.5;
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            
            const material = new THREE.PointsMaterial({
                color: 0xaaaaaa,
                size: 0.15,
                transparent: true,
                opacity: 0.4
            });

            rainParticles = new THREE.Points(geometry, material);
            rainParticles.userData.velocities = velocities;
            scene.add(rainParticles);
        }

        function createClouds() {
            const loader = new THREE.TextureLoader();
            // Using a simple circular gradient as a cloud texture fallback if CDN fails
            const canvas = document.createElement('canvas');
            canvas.width = 128;
            canvas.height = 128;
            const ctx = canvas.getContext('2d');
            const grad = ctx.createRadialGradient(64, 64, 0, 64, 64, 64);
            grad.addColorStop(0, 'rgba(255, 255, 255, 0.4)');
            grad.addColorStop(1, 'rgba(255, 255, 255, 0)');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, 128, 128);
            const texture = new THREE.CanvasTexture(canvas);

            for (let i = 0; i < config.cloudCount; i++) {
                const material = new THREE.SpriteMaterial({
                    map: texture,
                    color: 0x445566,
                    transparent: true,
                    opacity: 0.3
                });
                const sprite = new THREE.Sprite(material);
                const scale = 40 + Math.random() * 40;
                sprite.scale.set(scale, scale * 0.6, 1);
                
                sprite.position.set(
                    (Math.random() - 0.5) * 400,
                    20 + Math.random() * 20,
                    -100 - Math.random() * 50
                );
                
                clouds.push(sprite);
                scene.add(sprite);
            }
        }

        function createBirds() {
            // Simple V-shape bird geometry
            const geometry = new THREE.BufferGeometry();
            const vertices = new Float32Array([
                -0.5, 0, 0,
                0, 0, 0.2,
                0.5, 0, 0
            ]);
            geometry.setAttribute('position', new THREE.BufferAttribute(vertices, 3));

            const material = new THREE.LineBasicMaterial({ color: 0x000000, opacity: 0.8, transparent: true });
            birdInstances = new THREE.Group();

            for (let i = 0; i < config.birdCount; i++) {
                const bird = new THREE.Line(geometry, material);
                const angle = Math.random() * Math.PI * 2;
                const radius = 50 + Math.random() * 30;
                
                bird.userData = {
                    angle,
                    radius,
                    speed: 0.005 + Math.random() * 0.005,
                    height: 15 + Math.random() * 10,
                    offset: Math.random() * 100
                };
                
                birdInstances.add(bird);
            }
            scene.add(birdInstances);
        }

        // --- Animation ---

        function updateRain() {
            const positions = rainParticles.geometry.attributes.position.array;
            const velocities = rainParticles.userData.velocities;

            for (let i = 0; i < config.rainCount; i++) {
                positions[i * 3 + 1] -= velocities[i];
                // Wind drift
                positions[i * 3] -= 0.05;

                if (positions[i * 3 + 1] < 0) {
                    positions[i * 3 + 1] = 100;
                    positions[i * 3] = (Math.random() - 0.5) * 200;
                }
            }
            rainParticles.geometry.attributes.position.needsUpdate = true;
        }

        function updateBirds() {
            const time = clock.getElapsedTime();
            birdInstances.children.forEach((bird, i) => {
                const data = bird.userData;
                data.angle += data.speed;
                
                const x = Math.cos(data.angle) * data.radius;
                const z = Math.sin(data.angle) * data.radius;
                const y = data.height + Math.sin(time + data.offset) * 2;
                
                bird.position.set(x, y, z);
                bird.lookAt(
                    Math.cos(data.angle + 0.1) * data.radius,
                    y,
                    Math.sin(data.angle + 0.1) * data.radius
                );
                
                // Wing flap animation
                const wingSway = Math.sin(time * 10 + data.offset) * 0.2;
                bird.rotation.z = wingSway;
            });
        }

        function updateClouds() {
            clouds.forEach((cloud, i) => {
                cloud.position.x += 0.02;
                if (cloud.position.x > 200) cloud.position.x = -200;
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            
            const time = clock.getElapsedTime();
            
            updateRain();
            updateBirds();
            updateClouds();

            // Subtle camera movement
            camera.position.x = Math.sin(time * 0.1) * 2;
            camera.lookAt(0, 3, 0);

            renderer.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        init();
    </script>
</body>
</html>
