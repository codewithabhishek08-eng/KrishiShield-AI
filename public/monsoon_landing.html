<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KrishiShield AI | Nature Intelligence</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anybody:ital,wght@0,900;1,900&family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #81C784;
            --primary-dark: #2E7D32;
            --bg: #050A05;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: var(--bg); 
            color: white; 
            font-family: 'Inter', sans-serif; 
            overflow: hidden;
            cursor: default;
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
        }

        .overlay {
            position: relative;
            z-index: 10;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, transparent 0%, rgba(5,10,5,0.4) 100%);
            pointer-events: none;
        }

        .hero-content {
            text-align: center;
            pointer-events: auto;
            opacity: 0;
            transform: translateY(30px);
        }

        h1 {
            font-family: 'Anybody', sans-serif;
            font-weight: 900;
            font-style: italic;
            font-size: clamp(3rem, 10vw, 7rem);
            line-height: 0.9;
            margin-bottom: 1rem;
            color: #E8F5E9;
            text-shadow: 0 0 40px rgba(129, 199, 132, 0.2);
            letter-spacing: -0.02em;
            text-transform: uppercase;
        }

        .tagline {
            font-size: clamp(1rem, 2vw, 1.25rem);
            color: rgba(200, 230, 200, 0.7);
            margin-bottom: 3rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            font-weight: 500;
        }

        .btn-primary {
            background: linear-gradient(135deg, #1B5E20, #2E7D32);
            color: white;
            padding: 1.25rem 3.5rem;
            border-radius: 100px;
            text-decoration: none;
            font-weight: 700;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            border: 1px solid rgba(129, 199, 132, 0.3);
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            display: inline-block;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            position: relative;
            overflow: hidden;
        }

        .btn-primary:hover {
            transform: scale(1.05) translateY(-5px);
            box-shadow: 0 20px 60px rgba(46, 125, 50, 0.4);
            border-color: rgba(129, 199, 132, 0.6);
        }

        .btn-primary::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 5px;
            height: 5px;
            background: rgba(255,255,255,0.4);
            opacity: 0;
            border-radius: 100%;
            transform: scale(1, 1) translate(-50%);
            transform-origin: 50% 50%;
        }

        @keyframes ripple {
            0% { transform: scale(0, 0); opacity: 1; }
            100% { transform: scale(40, 40); opacity: 0; }
        }

        .btn-primary:active::after {
            animation: ripple 0.6s ease-out;
        }

        .loading-screen {
            position: fixed;
            inset: 0;
            background: #050A05;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 1.5s ease;
        }

        .loader {
            width: 40px;
            height: 40px;
            border: 2px solid rgba(129, 199, 132, 0.1);
            border-top-color: #81C784;
            border-radius: 50%;
            animation: spin 1s infinite linear;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .vignette {
            position: fixed;
            inset: 0;
            pointer-events: none;
            background: radial-gradient(circle at center, transparent 40%, rgba(0,0,0,0.4) 100%);
            z-index: 5;
        }
    </style>
</head>
<body>
    <div id="loading-screen" class="loading-screen">
        <div class="loader"></div>
    </div>

    <div class="vignette"></div>
    
    <div id="canvas-container"></div>

    <div class="overlay">
        <div class="hero-content" id="hero-content">
            <p class="tagline">Nature-Powered Intelligence</p>
            <h1>Krishi Shield AI</h1>
            <a href="/dashboard" class="btn-primary" id="enter-btn">Enter the Field</a>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.158.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.158.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import gsap from 'https://cdn.skypack.dev/gsap';

        let scene, camera, renderer, terrain, rain, clouds, birds;
        const clock = new THREE.Clock();

        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x0A150A, 0.012);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
            camera.position.set(0, 15, 60);
            camera.lookAt(0, 5, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
            renderer.outputColorSpace = THREE.SRGBColorSpace;
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // Lighting
            const ambientLight = new THREE.AmbientLight(0x406040, 0.8);
            scene.add(ambientLight);

            const sunLight = new THREE.DirectionalLight(0xE8F5E9, 1.2);
            sunLight.position.set(50, 100, 50);
            scene.add(sunLight);

            createTerrain();
            createRain();
            createClouds();
            createBirds();

            window.addEventListener('resize', onWindowResize);
            
            // Start Entrance Animation
            gsap.to('#loading-screen', { opacity: 0, duration: 1.5, delay: 0.5, onComplete: () => {
                document.getElementById('loading-screen').style.display = 'none';
                showHero();
            }});
        }

        function createTerrain() {
            const geometry = new THREE.PlaneGeometry(300, 300, 128, 128);
            
            // Procedural Mountains
            const pos = geometry.attributes.position;
            for (let i = 0; i < pos.count; i++) {
                const x = pos.getX(i);
                const y = pos.getY(i);
                const d = Math.sqrt(x*x + y*y);
                const height = (Math.sin(x * 0.05) + Math.cos(y * 0.05)) * 8 + 
                               (Math.sin(x * 0.1) * Math.cos(y * 0.1)) * 4;
                pos.setZ(i, height - d * 0.1);
            }
            geometry.computeVertexNormals();

            const material = new THREE.MeshPhongMaterial({
                color: 0x1B5E20,
                emissive: 0x051505,
                flatShading: false,
                shininess: 0
            });

            terrain = new THREE.Mesh(geometry, material);
            terrain.rotation.x = -Math.PI / 2;
            terrain.position.y = -5;
            scene.add(terrain);
        }

        function createRain() {
            const count = 12000;
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(count * 3);
            const velocities = new Float32Array(count);

            for (let i = 0; i < count; i++) {
                positions[i * 3] = (Math.random() - 0.5) * 200;
                positions[i * 3 + 1] = Math.random() * 100;
                positions[i * 3 + 2] = (Math.random() - 0.5) * 200;
                velocities[i] = 0.5 + Math.random() * 0.8;
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            
            const material = new THREE.PointsMaterial({
                color: 0x81C784,
                size: 0.1,
                transparent: true,
                opacity: 0.4
            });

            rain = new THREE.Points(geometry, material);
            scene.add(rain);
            rain.userData.velocities = velocities;
        }

        function createClouds() {
            clouds = new THREE.Group();
            const cloudGeo = new THREE.SphereGeometry(15, 12, 12);
            const cloudMat = new THREE.MeshBasicMaterial({
                color: 0x2E7D32,
                transparent: true,
                opacity: 0.1,
                fog: true
            });

            for(let i = 0; i < 8; i++) {
                const cloud = new THREE.Mesh(cloudGeo, cloudMat);
                cloud.position.set(
                    (Math.random() - 0.5) * 400,
                    20 + Math.random() * 40,
                    (Math.random() - 0.5) * 400
                );
                cloud.scale.set(1, 0.3, 2);
                clouds.add(cloud);
            }
            scene.add(clouds);
        }

        function createBirds() {
            const count = 40;
            birds = new THREE.Group();
            const birdGeo = new THREE.BufferGeometry();
            const verts = new Float32Array([
                -0.5, 0, 0,
                0, 0, 0.5,
                0.5, 0, 0
            ]);
            birdGeo.setAttribute('position', new THREE.BufferAttribute(verts, 3));
            const birdMat = new THREE.MeshBasicMaterial({ color: 0x000000, side: THREE.DoubleSide });

            for(let i = 0; i < count; i++) {
                const bird = new THREE.Mesh(birdGeo, birdMat);
                bird.position.set(
                    (Math.random() - 0.5) * 100,
                    20 + Math.random() * 20,
                    (Math.random() - 0.5) * 100
                );
                bird.userData = {
                    speed: 0.1 + Math.random() * 0.2,
                    angle: Math.random() * Math.PI * 2,
                    phase: Math.random() * Math.PI * 2
                };
                birds.add(bird);
            }
            scene.add(birds);
        }

        function animate() {
            requestAnimationFrame(animate);
            const t = clock.getElapsedTime();

            // Animate Rain
            const rainPos = rain.geometry.attributes.position.array;
            const rainVels = rain.userData.velocities;
            for (let i = 0; i < rainPos.length / 3; i++) {
                rainPos[i * 3 + 1] -= rainVels[i];
                rainPos[i * 3] -= 0.1; // Wind
                if (rainPos[i * 3 + 1] < -10) {
                    rainPos[i * 3 + 1] = 100;
                    rainPos[i * 3] = (Math.random() - 0.5) * 200;
                }
            }
            rain.geometry.attributes.position.needsUpdate = true;

            // Animate Clouds
            clouds.children.forEach((cloud, i) => {
                cloud.position.x += 0.05;
                if(cloud.position.x > 200) cloud.position.x = -200;
                cloud.position.y += Math.sin(t + i) * 0.01;
            });

            // Animate Birds
            birds.children.forEach((bird, i) => {
                bird.userData.angle += bird.userData.speed * 0.1;
                bird.position.x += Math.cos(bird.userData.angle) * bird.userData.speed;
                bird.position.z += Math.sin(bird.userData.angle) * bird.userData.speed;
                bird.position.y += Math.sin(t * 2 + i) * 0.05;
                bird.rotation.y = -bird.userData.angle + Math.PI/2;
                bird.rotation.x = Math.sin(t * 5 + i) * 0.2; // Flapping wing feel
            });

            // Camera Breathing
            camera.position.y += Math.sin(t * 0.5) * 0.01;
            camera.position.x += Math.cos(t * 0.3) * 0.01;

            renderer.render(scene, camera);
        }

        function showHero() {
            gsap.to('#hero-content', { 
                opacity: 1, 
                y: 0, 
                duration: 1.5, 
                ease: 'power3.out' 
            });
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        document.getElementById('enter-btn').addEventListener('click', (e) => {
            e.preventDefault();
            gsap.to('.overlay', { opacity: 0, duration: 0.8 });
            gsap.to(camera.position, {
                z: -100,
                y: 40,
                duration: 1.5,
                ease: 'power3.in',
                onComplete: () => {
                    window.location.href = '/dashboard';
                }
            });
        });

        init();
        animate();
    </script>
</body>
</html>
