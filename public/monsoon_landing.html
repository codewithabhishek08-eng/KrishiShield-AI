<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KrishiShield AI | Monsoon Valley</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anybody:ital,wght@1,900&family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #81C784;
      --accent: #2E7D32;
      --bg: #0A0F0A;
    }
    body, html {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: 'Inter', sans-serif;
      color: white;
    }
    canvas { display: block; position: fixed; inset: 0; z-index: 0; }

    #ui-overlay {
      position: relative; z-index: 10;
      height: 100vh; width: 100%;
      display: flex; flex-col; items-center; justify-content: center;
      background: radial-gradient(circle at center, transparent, rgba(0,0,0,0.4));
      pointer-events: none;
      opacity: 0;
    }

    .hero-container { text-align: center; pointer-events: auto; }
    
    .top-line {
      font-family: 'Anybody', sans-serif;
      font-size: clamp(1rem, 2vw, 1.4rem);
      text-transform: uppercase;
      letter-spacing: 0.5em;
      color: var(--primary);
      margin-bottom: 1rem;
      opacity: 0.8;
    }

    h1 {
      font-family: 'Anybody', sans-serif;
      font-size: clamp(3rem, 10vw, 7rem);
      font-style: italic;
      margin: 0;
      line-height: 1;
      background: linear-gradient(to bottom, #fff, #81C784);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 30px rgba(129, 199, 132, 0.3));
    }

    .tagline {
      font-size: clamp(0.9rem, 1.5vw, 1.2rem);
      font-weight: 300;
      letter-spacing: 0.2em;
      opacity: 0.5;
      margin-top: 1.5rem;
      margin-bottom: 3rem;
    }

    .cta-button {
      background: linear-gradient(135deg, var(--accent), var(--primary));
      border: none; color: white;
      padding: 18px 48px;
      font-size: 14px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.3em;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.2, 1, 0.3, 1);
      box-shadow: 0 10px 40px rgba(46, 125, 50, 0.4);
      position: relative; overflow: hidden;
    }
    .cta-button:hover {
      transform: translateY(-4px) scale(1.02);
      box-shadow: 0 20px 60px rgba(46, 125, 50, 0.6);
    }
    .cta-button::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transform: translateX(-100%);
      transition: transform 0.6s ease;
    }
    .cta-button:hover::after { transform: translateX(100%); }

    .loading-screen {
      position: fixed; inset: 0; z-index: 100;
      background: #0A0D1B;
      display: flex; flex-direction: column; items-center; justify-content: center;
      transition: opacity 1.5s ease;
    }
    .loader {
      width: 40px; height: 40px;
      border: 2px solid rgba(129, 199, 132, 0.2);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.158.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.158.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>

  <div class="loading-screen" id="loader">
    <div class="loader"></div>
    <p style="margin-top: 20px; font-size: 10px; text-transform: uppercase; letter-spacing: 0.4em; color: rgba(129, 199, 132, 0.5)">Calibrating Valley Telemetry</p>
  </div>

  <div id="ui-overlay">
    <div class="hero-container">
      <div class="top-line">KrishiShield AI</div>
      <h1>मानसून घाटी</h1>
      <div class="tagline">Intelligence grows in the heart of the valley.</div>
      <button class="cta-button" onclick="enterApp()">Enter the Field</button>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { gsap } from 'https://cdn.skypack.dev/gsap';

    // --- CONFIG & UTILS ---
    const TIER = navigator.hardwareConcurrency > 4 ? 'ULTRA' : 'STANDARD';
    const RAIN_COUNT = TIER === 'ULTRA' ? 12000 : 6000;
    const BIRD_COUNT = 8;
    
    // --- SHADERS ---
    const TERRAIN_VS = `
      varying vec2 vUv;
      varying float vHeight;
      uniform float uTime;
      
      // Simple Perlin-like noise
      float hash(vec2 p) { return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453123); }
      float noise(vec2 p) {
        vec2 i = floor(p); vec2 f = fract(p);
        vec2 u = f * f * (3.0 - 2.0 * f);
        return mix(mix(hash(i + vec2(0.0,0.0)), hash(i + vec2(1.0,0.0)), u.x),
                   mix(hash(i + vec2(0.0,1.0)), hash(i + vec2(1.0,1.0)), u.x), u.y);
      }
      
      void main() {
        vUv = uv;
        vec3 pos = position;
        float h = noise(uv * 3.5) * 15.0 + noise(uv * 8.0) * 4.0;
        // Valley dip in center
        float dist = length(uv - 0.5);
        h *= smoothstep(0.0, 0.5, dist);
        
        pos.z += h;
        vHeight = h;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
      }
    `;

    const TERRAIN_FS = `
      varying vec2 vUv;
      varying float vHeight;
      void main() {
        vec3 baseGreen = vec3(0.08, 0.25, 0.12);
        vec3 peakGreen = vec3(0.15, 0.45, 0.2);
        vec3 color = mix(baseGreen, peakGreen, vHeight / 19.0);
        
        // Mist fade
        float mist = smoothstep(0.0, 1.0, vHeight / 25.0);
        gl_FragColor = vec4(color, 1.0);
      }
    `;

    // --- CORE SETUP ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050A05);
    scene.fog = new THREE.FogExp2(0x050A05, 0.02);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 5, 45);
    camera.lookAt(0, 10, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    document.body.appendChild(renderer.domElement);

    // --- ELEMENTS ---

    // 1. Terrain Valley
    const terrainGeo = new THREE.PlaneGeometry(200, 200, 128, 128);
    terrainGeo.rotateX(-Math.PI / 2);
    const terrainMat = new THREE.ShaderMaterial({
      vertexShader: TERRAIN_VS,
      fragmentShader: TERRAIN_FS,
      uniforms: { uTime: { value: 0 } },
      side: THREE.DoubleSide
    });
    const terrain = new THREE.Mesh(terrainGeo, terrainMat);
    terrain.position.y = -5;
    scene.add(terrain);

    // 2. Cloud System
    const clouds = new THREE.Group();
    const cloudGeo = new THREE.PlaneGeometry(120, 40);
    for(let i=0; i<6; i++) {
      const cloudMat = new THREE.MeshBasicMaterial({
        color: 0x223322,
        transparent: true,
        opacity: 0.15,
        map: new THREE.TextureLoader().load('https://picsum.photos/seed/cloud/512/256'), // Placeholder for soft noise
        depthWrite: false
      });
      const cloud = new THREE.Mesh(cloudGeo, cloudMat);
      cloud.position.set((Math.random()-0.5)*100, 25 + i*2, -80 - i*10);
      cloud.userData.speed = 0.02 + Math.random()*0.03;
      clouds.add(cloud);
    }
    scene.add(clouds);

    // 3. Rain Particle System
    const rainGeo = new THREE.BufferGeometry();
    const rainPos = new Float32Array(RAIN_COUNT * 3);
    const rainVel = new Float32Array(RAIN_COUNT);
    for(let i=0; i<RAIN_COUNT; i++) {
      rainPos[i*3] = (Math.random() - 0.5) * 100;
      rainPos[i*3+1] = Math.random() * 80;
      rainPos[i*3+2] = (Math.random() - 0.5) * 80;
      rainVel[i] = 0.3 + Math.random() * 0.4;
    }
    rainGeo.setAttribute('position', new THREE.BufferAttribute(rainPos, 3));
    const rainMat = new THREE.PointsMaterial({
      color: 0x81C784,
      size: 0.12,
      transparent: true,
      opacity: 0.4,
      depthWrite: false
    });
    const rain = new THREE.Points(rainGeo, rainMat);
    scene.add(rain);

    // 4. Bird Flock (Simple V-shapes)
    const birds = new THREE.Group();
    const birdGeo = new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(-0.2, 0, 0), new THREE.Vector3(0, 0.1, 0), new THREE.Vector3(0.2, 0, 0)
    ]);
    const birdMat = new THREE.LineBasicMaterial({ color: 0x000000, opacity: 0.6, transparent: true });
    for(let i=0; i<BIRD_COUNT; i++) {
      const bird = new THREE.Line(birdGeo, birdMat);
      bird.userData.angle = Math.random() * Math.PI * 2;
      bird.userData.radius = 20 + Math.random() * 15;
      bird.userData.yOffset = 25 + Math.random() * 10;
      bird.userData.speed = 0.005 + Math.random() * 0.005;
      birds.add(bird);
    }
    scene.add(birds);

    // --- LIGHTING ---
    const hemiLight = new THREE.HemisphereLight(0xB0BEC5, 0x1B5E20, 0.8);
    scene.add(hemiLight);

    const sun = new THREE.DirectionalLight(0xffffff, 0.4);
    sun.position.set(20, 40, -50);
    scene.add(sun);

    // --- ANIMATION LOOP ---
    const clock = new THREE.Clock();

    function animate() {
      const t = clock.getElapsedTime();
      requestAnimationFrame(animate);
      
      // Animate Terrain
      terrainMat.uniforms.uTime.value = t;

      // Animate Clouds
      clouds.children.forEach(c => {
        c.position.x += c.userData.speed;
        if(c.position.x > 80) c.position.x = -80;
      });

      // Animate Rain
      const positions = rain.geometry.attributes.position.array;
      for(let i=0; i<RAIN_COUNT; i++) {
        positions[i*3+1] -= rainVel[i];
        positions[i*3] -= 0.05; // Wind
        if(positions[i*3+1] < -5) {
          positions[i*3+1] = 60;
          positions[i*3] = (Math.random() - 0.5) * 100;
        }
      }
      rain.geometry.attributes.position.needsUpdate = true;

      // Animate Birds
      birds.children.forEach(b => {
        b.userData.angle += b.userData.speed;
        b.position.x = Math.cos(b.userData.angle) * b.userData.radius;
        b.position.z = Math.sin(b.userData.angle) * b.userData.radius - 40;
        b.position.y = b.userData.yOffset + Math.sin(t + b.userData.angle) * 2;
        b.lookAt(
          Math.cos(b.userData.angle + 0.1) * b.userData.radius,
          b.position.y,
          Math.sin(b.userData.angle + 0.1) * b.userData.radius - 40
        );
      });

      // Camera breathing
      camera.position.y = 5 + Math.sin(t * 0.5) * 0.2;
      camera.position.x = Math.sin(t * 0.3) * 0.5;

      renderer.render(scene, camera);
    }

    // --- ENTRY SEQUENCE ---
    window.addEventListener('load', () => {
      setTimeout(() => {
        gsap.to('#loader', { opacity: 0, duration: 1.5, onComplete: () => {
          document.getElementById('loader').style.display = 'none';
          gsap.to('#ui-overlay', { opacity: 1, duration: 2 });
          animate();
        }});
      }, 1500);
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    window.enterApp = () => {
      gsap.to('body', { opacity: 0, duration: 1, onComplete: () => {
        window.location.href = '/dashboard';
      }});
    };

  </script>
</body>
</html>
