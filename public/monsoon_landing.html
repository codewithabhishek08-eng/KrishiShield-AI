<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KrishiShield AI | Nature Friendly Intelligence</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anybody:ital,wght@0,100..900;1,100..900&family=Inter:wght@100..900&display=swap" rel="stylesheet">
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.158.0/examples/jsm/"
            }
        }
    </script>
    <style>
        :root {
            --primary: #4CAF50;
            --primary-dark: #2E7D32;
            --text-main: #E8F5E9;
            --glass: rgba(15, 30, 15, 0.6);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #050A05;
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 0;
            pointer-events: none;
        }

        /* --- UI OVERLAY --- */
        #ui-root {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: radial-gradient(circle at center, transparent 0%, rgba(5,10,5,0.4) 100%);
        }

        .hero-container {
            max-width: 800px;
            padding: 20px;
            animation: fadeIn 2s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hindi-line {
            font-family: 'Anybody', sans-serif;
            font-weight: 900;
            font-style: italic;
            font-size: clamp(1rem, 3vw, 1.5rem);
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 0.2em;
            margin-bottom: 0.5rem;
            opacity: 0.8;
        }

        .main-title {
            font-family: 'Anybody', sans-serif;
            font-weight: 900;
            font-style: italic;
            font-size: clamp(3rem, 10vw, 7rem);
            line-height: 0.9;
            margin-bottom: 1.5rem;
            background: linear-gradient(to bottom, #FFFFFF, #A5D6A7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .tagline {
            font-size: clamp(1rem, 2.5vw, 1.4rem);
            font-weight: 300;
            opacity: 0.7;
            max-width: 600px;
            margin: 0 auto 3rem;
            line-height: 1.6;
        }

        .btn-group {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 18px 48px;
            border-radius: 100px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            text-decoration: none;
            font-size: 14px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            box-shadow: 0 10px 30px rgba(76, 175, 80, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 20px 40px rgba(76, 175, 80, 0.5);
        }

        .btn-outline {
            background: rgba(255,255,255,0.05);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
        }

        .btn-outline:hover {
            background: rgba(255,255,255,0.1);
            border-color: var(--primary);
        }

        /* --- PERFORMANCE INDICATOR --- */
        .perf-hint {
            position: fixed;
            bottom: 30px;
            left: 30px;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            opacity: 0.3;
            font-weight: 900;
        }
    </style>
</head>
<body>

    <div id="ui-root">
        <div class="hero-container">
            <div class="hindi-line">प्रकृति और प्रगति।</div>
            <h1 class="main-title">KrishiShield AI</h1>
            <p class="tagline">The intelligence of nature, amplified by technology. Empowering farmers with precision and peace of mind.</p>
            
            <div class="btn-group">
                <a href="/dashboard" class="btn btn-primary">Enter Dashboard</a>
                <a href="#" class="btn btn-outline">Explore Mission</a>
            </div>
        </div>
    </div>

    <div class="perf-hint">Nature-Engine V2.0 // Active</div>

    <script type="module">
        import * as THREE from 'three';

        // --- SCENE SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050A05);
        scene.fog = new THREE.FogExp2(0x050A05, 0.04);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 15);
        camera.lookAt(0, 2, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        // --- LIGHTING ---
        const ambientLight = new THREE.AmbientLight(0x404040, 2);
        scene.add(ambientLight);

        const sunLight = new THREE.DirectionalLight(0xffffff, 2);
        sunLight.position.set(5, 10, 7.5);
        scene.add(sunLight);

        // --- GRASS SYSTEM ---
        const GRASS_COUNT = 15000;
        const grassGeo = new THREE.PlaneGeometry(0.1, 1.2, 1, 4);
        grassGeo.translate(0, 0.6, 0); // Move origin to base

        const grassMat = new THREE.ShaderMaterial({
            uniforms: {
                uTime: { value: 0 },
                uColorLow: { value: new THREE.Color(0x1B5E20) },
                uColorHigh: { value: new THREE.Color(0x81C784) }
            },
            vertexShader: `
                varying vec2 vUv;
                varying float vHeightFactor;
                uniform float uTime;
                
                void main() {
                    vUv = uv;
                    vHeightFactor = position.y;
                    
                    vec3 pos = position;
                    
                    // Gentle swaying motion
                    float wave = sin(uTime * 1.5 + modelMatrix[3][0] * 0.5 + modelMatrix[3][2] * 0.3) * 0.2;
                    wave += sin(uTime * 2.8 + modelMatrix[3][0] * 0.1) * 0.05;
                    
                    pos.x += wave * vHeightFactor;
                    pos.z += wave * 0.5 * vHeightFactor;

                    gl_Position = projectionMatrix * modelViewMatrix * instanceMatrix * vec4(pos, 1.0);
                }
            `,
            fragmentShader: `
                varying vec2 vUv;
                varying float vHeightFactor;
                uniform vec3 uColorLow;
                uniform vec3 uColorHigh;

                void main() {
                    vec3 color = mix(uColorLow, uColorHigh, vHeightFactor);
                    gl_FragColor = vec4(color, 1.0);
                }
            `,
            side: THREE.DoubleSide
        });

        const grassMesh = new THREE.InstancedMesh(grassGeo, grassMat, GRASS_COUNT);
        const dummy = new THREE.Object3D();

        for (let i = 0; i < GRASS_COUNT; i++) {
            const x = (Math.random() - 0.5) * 60;
            const z = (Math.random() - 0.5) * 60;
            
            // Create some rolling hills logic
            const y = Math.sin(x * 0.1) * Math.cos(z * 0.1) * 2;
            
            dummy.position.set(x, y, z);
            dummy.rotation.y = Math.random() * Math.PI;
            dummy.scale.setScalar(0.8 + Math.random() * 0.5);
            dummy.updateMatrix();
            grassMesh.setMatrixAt(i, dummy.matrix);
        }
        scene.add(grassMesh);

        // --- POLLEN PARTICLES ---
        const POLLEN_COUNT = 800;
        const pollenGeo = new THREE.BufferGeometry();
        const pollenPos = new Float32Array(POLLEN_COUNT * 3);
        for(let i=0; i<POLLEN_COUNT*3; i+=3) {
            pollenPos[i] = (Math.random() - 0.5) * 50;
            pollenPos[i+1] = Math.random() * 20;
            pollenPos[i+2] = (Math.random() - 0.5) * 50;
        }
        pollenGeo.setAttribute('position', new THREE.BufferAttribute(pollenPos, 3));
        const pollenMat = new THREE.PointsMaterial({
            color: 0xffffff,
            size: 0.08,
            transparent: true,
            opacity: 0.4,
            blending: THREE.AdditiveBlending
        });
        const pollenPoints = new THREE.Points(pollenGeo, pollenMat);
        scene.add(pollenPoints);

        // --- TERRAIN ---
        const groundGeo = new THREE.PlaneGeometry(100, 100, 100, 100);
        groundGeo.rotateX(-Math.PI / 2);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x050F05, roughness: 1 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        
        // Match hills with grass
        const posAttr = groundGeo.getAttribute('position');
        for (let i = 0; i < posAttr.count; i++) {
            const px = posAttr.getX(i);
            const pz = posAttr.getZ(i);
            posAttr.setY(i, Math.sin(px * 0.1) * Math.cos(pz * 0.1) * 2 - 0.2);
        }
        scene.add(ground);

        // --- ANIMATION LOOP ---
        const clock = new THREE.Clock();

        function animate() {
            const elapsed = clock.getElapsedTime();
            
            // Update grass
            grassMat.uniforms.uTime.value = elapsed;

            // Move camera gently
            camera.position.x = Math.sin(elapsed * 0.2) * 2;
            camera.position.z = 15 + Math.cos(elapsed * 0.1) * 2;
            camera.lookAt(0, 1, 0);

            // Animate pollen
            const positions = pollenPoints.geometry.attributes.position.array;
            for(let i=0; i<POLLEN_COUNT; i++) {
                const idx = i * 3;
                positions[idx+1] += Math.sin(elapsed + i) * 0.01; // Vertical drift
                positions[idx] += 0.02; // Lateral drift
                
                if(positions[idx] > 25) positions[idx] = -25;
            }
            pollenPoints.geometry.attributes.position.needsUpdate = true;

            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        animate();

        // --- RESIZE ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
