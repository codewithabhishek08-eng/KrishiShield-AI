<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KrishiShield AI | Monsoon Genesis</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anybody:ital,wght@0,900;1,900&family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.158.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.158.0/examples/jsm/",
                "gsap": "https://cdn.jsdelivr.net/npm/gsap@3.12.2/index.js"
            }
        }
    </script>
    <style>
        :root {
            --primary: #81C784;
            --background: #0A0D1A;
            --text: #E8F5E9;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--background);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            cursor: none;
        }

        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 0;
        }

        #ui {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            text-align: center;
            opacity: 0;
        }

        .hindi {
            font-family: 'Anybody', sans-serif;
            font-weight: 900;
            font-style: italic;
            font-size: clamp(1.2rem, 4vw, 2rem);
            color: rgba(129, 199, 132, 0.7);
            letter-spacing: 0.1em;
            margin-bottom: 0.5rem;
        }

        h1 {
            font-family: 'Anybody', sans-serif;
            font-weight: 900;
            font-style: italic;
            font-size: clamp(3rem, 10vw, 7rem);
            margin: 0;
            background: linear-gradient(to bottom, #FFFFFF, #81C784);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 40px rgba(129, 199, 132, 0.3);
        }

        .tagline {
            font-size: clamp(1rem, 2.5vw, 1.4rem);
            font-weight: 300;
            color: rgba(232, 245, 233, 0.6);
            letter-spacing: 0.05em;
            margin-top: 1rem;
            max-width: 600px;
        }

        .cta-container {
            margin-top: 3rem;
            pointer-events: auto;
        }

        .lotus-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 20px 40px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s ease;
        }

        .lotus-btn:hover {
            transform: scale(1.05);
        }

        .lotus-btn span {
            position: relative;
            z-index: 2;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            font-size: 14px;
            color: white;
        }

        .lotus-svg {
            position: absolute;
            width: 100%;
            height: 100%;
            fill: #1B5E20;
            filter: drop-shadow(0 0 15px rgba(27, 94, 32, 0.5));
            transition: fill 0.3s ease;
        }

        .lotus-btn:hover .lotus-svg {
            fill: #2E7D32;
        }

        #custom-cursor {
            position: fixed;
            width: 40px;
            height: 40px;
            border: 2px solid rgba(129, 199, 132, 0.4);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            transition: width 0.3s, height 0.3s, border-color 0.3s;
        }

        .performance-tag {
            position: fixed;
            bottom: 20px;
            right: 20px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            opacity: 0.3;
        }
    </style>
</head>
<body>
    <div id="custom-cursor"></div>
    <div id="ui">
        <div class="hindi">मानसून आया।</div>
        <h1>KrishiShield AI</h1>
        <div class="tagline">Turn every raindrop into revenue. Protection that grows with you.</div>
        <div class="cta-container">
            <button class="lotus-btn" onclick="enterApp()">
                <svg class="lotus-svg" viewBox="0 0 100 100">
                    <path d="M50 10 C60 40 90 50 50 90 C10 50 40 40 50 10 Z" />
                    <path d="M50 10 C70 30 95 60 50 90 C5 60 30 30 50 10 Z" opacity="0.6" />
                </svg>
                <span>Enter the Field</span>
            </button>
        </div>
    </div>
    <div class="performance-tag" id="perf">Ultra Tier</div>

    <script type="module">
        import * as THREE from 'three';
        import { gsap } from 'gsap';

        // --- CORE VARIABLES ---
        let scene, camera, renderer, clock;
        let rain, water, terrain, rice, forest, sky;
        let creationRipple = { radius: 0 };
        const mouse = new THREE.Vector2();

        // --- SHADERS ---
        const TERRAIN_VS = `
            varying vec2 vUv;
            varying float vHeight;
            uniform float uCreationTime;
            
            float hash(vec2 p) { return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453123); }
            float noise(vec2 p) {
                vec2 i = floor(p); vec2 f = fract(p);
                vec2 u = f * f * (3.0 - 2.0 * f);
                return mix(mix(hash(i + vec2(0.0,0.0)), hash(i + vec2(1.0,0.0)), u.x),
                           mix(hash(i + vec2(0.0,1.0)), hash(i + vec2(1.0,1.0)), u.x), u.y);
            }

            void main() {
                vUv = uv;
                vec3 pos = position;
                float h = noise(uv * 1.5) * 4.0;
                h += noise(uv * 8.0) * 0.5;
                
                // Distant hills
                float dist = length(pos.xz);
                h += smoothstep(40.0, 150.0, dist) * 20.0;
                
                // Genesis outward effect
                float ripple = smoothstep(uCreationTime - 20.0, uCreationTime, dist);
                pos.y += h * (1.0 - ripple);
                
                vHeight = pos.y;
                gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
            }
        `;

        const TERRAIN_FS = `
            varying vec2 vUv;
            varying float vHeight;
            void main() {
                vec3 waterCol = vec3(0.04, 0.12, 0.06);
                vec3 soilCol = vec3(0.1, 0.18, 0.08);
                vec3 bundCol = vec3(0.16, 0.25, 0.12);
                
                vec3 color = mix(waterCol, soilCol, smoothstep(0.0, 1.5, vHeight));
                color = mix(color, bundCol, smoothstep(1.5, 3.0, vHeight));
                
                gl_FragColor = vec4(color, 1.0);
            }
        `;

        const WATER_FS = `
            uniform float uTime;
            uniform vec3 uColor;
            varying vec2 vUv;
            void main() {
                float pulse = sin(uTime * 0.5 + vUv.x * 10.0 + vUv.y * 10.0) * 0.02;
                vec3 color = uColor + pulse;
                gl_FragColor = vec4(color, 0.85);
            }
        `;

        // --- INITIALIZATION ---
        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0A0D1A);
            scene.fog = new THREE.FogExp2(0x0A0D1A, 0.012);

            camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 3, 12);
            camera.rotation.x = -0.1;

            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            clock = new THREE.Clock();

            createTerrain();
            createWater();
            createRain();
            createLights();
            
            window.addEventListener('resize', onWindowResize);
            window.addEventListener('mousemove', onMouseMove);

            startGenesis();
            animate();
        }

        function createTerrain() {
            const geo = new THREE.PlaneGeometry(300, 300, 256, 256);
            geo.rotateX(-Math.PI / 2);
            const mat = new THREE.ShaderMaterial({
                uniforms: { uCreationTime: { value: 0 } },
                vertexShader: TERRAIN_VS,
                fragmentShader: TERRAIN_FS
            });
            terrain = new THREE.Mesh(geo, mat);
            scene.add(terrain);
        }

        function createWater() {
            const geo = new THREE.PlaneGeometry(300, 300);
            geo.rotateX(-Math.PI / 2);
            const mat = new THREE.ShaderMaterial({
                uniforms: { 
                    uTime: { value: 0 },
                    uColor: { value: new THREE.Color(0x0A1A14) }
                },
                vertexShader: `
                    varying vec2 vUv;
                    void main() {
                        vUv = uv;
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }
                `,
                fragmentShader: WATER_FS,
                transparent: true
            });
            water = new THREE.Mesh(geo, mat);
            water.position.y = 0.05;
            scene.add(water);
        }

        function createRain() {
            const count = 100000;
            const geo = new THREE.BufferGeometry();
            const pos = new Float32Array(count * 3);
            for(let i=0; i<count*3; i+=3) {
                pos[i] = (Math.random() - 0.5) * 200;
                pos[i+1] = Math.random() * 100;
                pos[i+2] = (Math.random() - 0.5) * 200;
            }
            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            
            const mat = new THREE.PointsMaterial({
                color: 0x81C784,
                size: 0.1,
                transparent: true,
                opacity: 0.4
            });
            rain = new THREE.Points(geo, mat);
            scene.add(rain);
        }

        function createLights() {
            const hemi = new THREE.HemisphereLight(0x0D0D1A, 0x1B5E20, 0.6);
            scene.add(hemi);

            const dir = new THREE.DirectionalLight(0xFF7043, 0.3);
            dir.position.set(5, 5, 5);
            scene.add(dir);
        }

        function startGenesis() {
            gsap.to(terrain.material.uniforms.uCreationTime, {
                value: 300,
                duration: 4,
                ease: "power2.out",
                onComplete: () => {
                    gsap.to("#ui", { opacity: 1, duration: 1.5, delay: 0.5 });
                }
            });
        }

        function onMouseMove(e) {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            
            const cursor = document.getElementById('custom-cursor');
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            const t = clock.getElapsedTime();
            
            water.material.uniforms.uTime.value = t;
            
            const posArr = rain.geometry.attributes.position.array;
            for(let i=1; i<posArr.length; i+=3) {
                posArr[i] -= 0.6;
                if(posArr[i] < -2) posArr[i] = 60;
            }
            rain.geometry.attributes.position.needsUpdate = true;

            // Subtle camera breathing
            camera.position.y = 3 + Math.sin(t * 0.5) * 0.1;
            camera.rotation.z = Math.sin(t * 0.3) * 0.01;

            renderer.render(scene, camera);
        }

        window.enterApp = function() {
            gsap.to(camera.position, {
                z: -50,
                duration: 1.5,
                ease: "power3.in",
                onComplete: () => {
                    window.location.href = '/dashboard';
                }
            });
            gsap.to("#ui", { opacity: 0, duration: 0.5 });
        };

        init();
    </script>
</body>
</html>
